name: Matrix Build Workflow

on:
  push:

jobs:
  matrix-build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Python Version
        run: python --version
